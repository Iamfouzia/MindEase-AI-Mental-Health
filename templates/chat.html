<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindEase — Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    /* Reset */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* Base */
    body { font-family: 'Sora', sans-serif; background: #07080f; color: #e8e6f0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* Background orbs */
    .bg-orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .orb { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.15; animation: float 8s ease-in-out infinite; }
    .orb1 { width: 400px; height: 400px; background: #7c5cbf; top: -100px; left: -100px; }
    .orb2 { width: 300px; height: 300px; background: #3d8fd4; bottom: 100px; right: -80px; animation-delay: 3s; }
    .orb3 { width: 200px; height: 200px; background: #c45fa0; bottom: 0; left: 40%; animation-delay: 5s; }
    @keyframes float { 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(-20px); } }

    /* Navbar */
    .navbar { position: relative; z-index: 10; padding: 16px 28px; display: flex; align-items: center; justify-content: space-between; background: rgba(7,8,15,0.7); backdrop-filter: blur(20px); border-bottom: 0.5px solid rgba(255,255,255,0.08); }
    .logo { font-family: 'DM Serif Display', serif; font-size: 20px; background: linear-gradient(135deg, #b794f4, #76e4f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .logo em { font-style: italic; }
    .back-btn { background: rgba(255,255,255,0.06); border: 0.5px solid rgba(255,255,255,0.12); color: rgba(232,230,240,0.7); padding: 8px 18px; border-radius: 100px; font-size: 12px; cursor: pointer; font-family: 'Sora', sans-serif; transition: background 0.2s; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
    .back-btn:hover { background: rgba(255,255,255,0.1); }

    /* Chat container */
    .chat-container { position: relative; z-index: 1; flex: 1; display: flex; flex-direction: column; max-width: 760px; width: 100%; margin: 0 auto; padding: 20px 20px 0; overflow: hidden; }

    /* AI header */
    .ai-header { display: flex; align-items: center; gap: 12px; padding: 16px 20px; background: rgba(255,255,255,0.04); border: 0.5px solid rgba(255,255,255,0.08); border-radius: 16px; margin-bottom: 20px; }
    .ai-avatar { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, #7c5cbf, #5a89d8); display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .ai-name { font-size: 14px; font-weight: 500; }
    .ai-status { font-size: 11px; color: #7cba8a; display: flex; align-items: center; gap: 4px; margin-top: 2px; }
    .online-dot { width: 5px; height: 5px; border-radius: 50%; background: #7cba8a; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

    /* Messages area */
    .messages { flex: 1; overflow-y: auto; padding: 4px 4px 20px; display: flex; flex-direction: column; gap: 16px; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent; }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

    /* Welcome message */
    .welcome { text-align: center; padding: 20px; }
    .welcome h3 { font-family: 'DM Serif Display', serif; font-size: 22px; color: #f0eef8; margin-bottom: 8px; }
    .welcome p { font-size: 13px; color: rgba(232,230,240,0.45); line-height: 1.6; }

    /* Message bubbles */
    .msg { display: flex; gap: 10px; align-items: flex-end; }
    .msg.user { flex-direction: row-reverse; }
    .msg-bubble { max-width: 72%; padding: 12px 16px; border-radius: 20px; font-size: 14px; line-height: 1.6; }
    .msg-ai .msg-bubble { background: rgba(255,255,255,0.07); color: rgba(232,230,240,0.9); border-bottom-left-radius: 4px; }
    .msg.msg-user { flex-direction: row-reverse; }
.msg.msg-user .msg-bubble { background: linear-gradient(135deg, #7c5cbf, #5a89d8); color: #f0eef8; min-width: 60px; max-width: 72%; padding: 12px 16px; border-radius: 18px; display: block; box-shadow: 0 4px 15px rgba(124,92,191,0.3); }
    .msg-icon { width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(135deg, #7c5cbf, #5a89d8); display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }

    /* Emotion chip */
    .emotion-chip { display: inline-flex; align-items: center; gap: 5px; background: rgba(124,92,191,0.2); border: 0.5px solid rgba(178,140,255,0.3); padding: 3px 10px; border-radius: 100px; font-size: 10px; color: #c9a6ff; margin-top: 6px; }

    /* Input area */
    .input-area { position: relative; z-index: 10; padding: 16px 20px; background: rgba(7,8,15,0.8); backdrop-filter: blur(20px); border-top: 0.5px solid rgba(255,255,255,0.08); max-width: 760px; width: 100%; margin: 0 auto; }
    .input-row { display: flex; gap: 10px; align-items: center; }
    .chat-input { flex: 1; background: rgba(255,255,255,0.06); border: 0.5px solid rgba(255,255,255,0.12); border-radius: 100px; padding: 12px 20px; font-size: 14px; color: #e8e6f0; font-family: 'Sora', sans-serif; outline: none; transition: border-color 0.2s; }
    .chat-input:focus { border-color: rgba(178,140,255,0.4); }
    .chat-input::placeholder { color: rgba(232,230,240,0.35); }
    .send-btn { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, #7c5cbf, #5a89d8); border: none; cursor: pointer; color: white; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: opacity 0.2s, transform 0.2s; flex-shrink: 0; }
    .send-btn:hover { opacity: 0.85; transform: scale(1.05); }

    /* Disclaimer */
    .disclaimer { text-align: center; font-size: 10px; color: rgba(232,230,240,0.2); margin-top: 8px; }
  </style>
</head>
<body>

  <!-- Background orbs -->
  <div class="bg-orbs">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <!-- Navbar -->
  <div class="navbar">
    <div class="logo">Mind<em>Ease</em></div>
    <a href="/" class="back-btn">← Back to Home</a>
  </div>

  <!-- Chat area -->
  <div class="chat-container">

    <!-- AI status header -->
    <div class="ai-header">
      <div class="ai-avatar">🌙</div>
      <div>
        <div class="ai-name">MindEase AI</div>
        <div class="ai-status"><div class="online-dot"></div> Always listening 🤍</div>
      </div>
    </div>

    <!-- Messages -->
    <div class="messages" id="messages">
      <div class="welcome">
        <h3>Hello, I'm here for you 💜</h3>
        <p>Feel free to share anything on your mind.<br><p>No judgment. Just you and me. 🤍</p></p>
      </div>
    </div>

  </div>

  <!-- Input area -->
  <div class="input-area">
    <div class="input-row">
      <input class="chat-input" id="userInput" placeholder="Share what's on your mind...">
      <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
    <p class="disclaimer">MindEase is an AI assistant. Not a replacement for professional mental health care.</p>
  </div>

  <script>
    let conversationHistory = [];
    // Send message function
    async function sendMessage() {
      const input = document.getElementById('userInput');
      const msg = input.value.trim();
      if (!msg) return;

      const messages = document.getElementById('messages');

      // Show user message
      messages.innerHTML += `
        <div class="msg msg-user">
          <div class="msg-bubble">${msg}</div>
        </div>`;
      input.value = '';
      messages.scrollTop = messages.scrollHeight;

      // Show typing indicator
      messages.innerHTML += `
        <div class="msg msg-ai" id="typing">
          <div class="msg-icon">🌿</div>
          <div><div class="msg-bubble" style="color:rgba(232,230,240,0.4)">Typing...</div></div>
        </div>`;
      messages.scrollTop = messages.scrollHeight;

      // Call Flask API
      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 30000);
        const res = await fetch('/chat', {
            signal: controller.signal,
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },

          body: JSON.stringify({ message: msg, history: conversationHistory })
        });

        const data = await res.json();
        clearTimeout(timeout);
        
        // Remove typing indicator
        document.getElementById('typing').remove();

        // Show AI reply
        messages.innerHTML += `
          <div class="msg msg-ai">
            <div class="msg-icon">🌿</div>
            <div>
              <div class="msg-bubble">${data.reply}</div>
              ${data.emotion ? `<div class="emotion-chip">🌸 Emotion detected: ${data.emotion}</div>` : ''}
            </div>
          </div>`;
        messages.scrollTop = messages.scrollHeight;
        conversationHistory.push({ role: "user", content: msg });
        conversationHistory.push({ role: "assistant", content: data.reply });

      } catch (err) {
        // Remove typing and show error
        document.getElementById('typing')?.remove();
        messages.innerHTML += `
          <div class="msg msg-ai">
            <div class="msg-icon">🌿</div>
            <div><div class="msg-bubble">Something went wrong. Please try again. 💜</div></div>
          </div>`;
      }
    }

  
    document.getElementById('userInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
